name: Build wheel and sdist for a pure Python package

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to use for building'
        required: true
        type: number
      pip_packages:
        description: 'packages to install via pip'
        default: ''
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}

      # Install build tool
      - name: Install build dependencies
        run: python -m pip install --upgrade build

      # Install additional pip packages if specified
      - name: Install additional pip packages
        if: ${{ inputs.pip_packages != '' }}
        run: python -m pip install ${{ inputs.pip_packages }}

      # Build the package (creates both .whl and .tar.gz in ./dist)
      - name: Build wheel and sdist
        run: python -m build

      # Upload the wheel file
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: ./dist/*.whl

      # Upload the sdist file
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
